# Read the Docs configuration file

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"
  apt_packages:
    - doxygen
  commands:
    # Remove build cache for proper update
    - rm -rf $READTHEDOCS_OUTPUT/html
    - mkdir -p $READTHEDOCS_OUTPUT/html
    - rm -rf docs/build
    - rm -rf docs/source/xml 

    - cd docs/doxygen; doxygen Doxyfile
    #
    - python -m pip install -r docs/requirements.txt
    - python -m sphinx -E -b html docs/source $READTHEDOCS_OUTPUT/html

# Build documentation in the "docs/" directory with Sphinx
sphinx:
   configuration: docs/source/conf.py
   builder: html

formats:
  - htmlzip
  - pdf
